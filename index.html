<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotPixel Авторизация</title>
    <style>
        :root {
            --main-bg-color: #000;
            --text-color: #fff;
            --accent-color: #7000ff;
            --button-bg: #7000ff;
            --card-bg: #121212;
            --border-radius: 12px;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: var(--main-bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        .container {
            max-width: 480px;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }
        
        .card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 24px;
            text-align: center;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            display: block;
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: 16px;
            font-weight: 600;
        }
        
        p {
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 24px;
            color: rgba(255, 255, 255, 0.85);
        }
        
        .login-container {
            margin-top: 24px;
            margin-bottom: 24px;
            display: flex;
            justify-content: center;
        }
        
        .status {
            padding: 12px;
            border-radius: var(--border-radius);
            margin-top: 16px;
            display: none;
        }
        
        .status.success {
            background-color: rgba(46, 204, 113, 0.1);
            color: #2ecc71;
            display: block;
        }
        
        .status.error {
            background-color: rgba(231, 76, 60, 0.1);
            color: #e74c3c;
            display: block;
        }
        
        @media (prefers-color-scheme: light) {
            :root {
                --main-bg-color: #f5f5f5;
                --text-color: #000;
                --card-bg: #fff;
            }
            
            p {
                color: rgba(0, 0, 0, 0.85);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <svg class="logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="#7000FF"/>
                <path d="M2 17L12 22L22 17L12 12L2 17Z" fill="#7000FF"/>
                <path d="M2 12L12 17L22 12L12 7L2 12Z" fill="#8C52FF"/>
            </svg>
            
            <h1>NotPixel Авторизация</h1>
            <p>Для доступа к боту NotPixel вам необходимо авторизоваться через Telegram.</p>
            
            <div class="login-container">
                <div id="telegram-login"></div>
            </div>
            
            <div class="status" id="status"></div>
        </div>
    </div>
    
    <script>
        // Получаем ID пользователя из URL
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('user_id');
        const status = document.getElementById('status');
        
        // Функции для отображения статуса
        function showSuccess(message) {
            status.textContent = message;
            status.className = 'status success';
        }
        
        function showError(message) {
            status.textContent = message;
            status.className = 'status error';
        }
        
        // Функция, вызываемая после авторизации
        function onTelegramAuth(user) {
            // Показываем сообщение об успехе
            showSuccess("Авторизация успешна! Перенаправление в бот...");
            
            // Сериализуем данные пользователя
            const userData = encodeURIComponent(JSON.stringify(user));
            
            // Логируем для отладки
            console.log('Данные авторизации:', user);
            
            // Перенаправляем обратно в бот с данными
            setTimeout(() => {
                window.location.href = `https://t.me/notpxcheckbot?start=tgauth_${userData}`;
            }, 1500);
        }
        
        // Создаём виджет авторизации
        window.onload = function() {
            const script = document.createElement('script');
            script.src = "https://telegram.org/js/telegram-widget.js?22";
            script.setAttribute('data-telegram-login', 'notpxcheckbot');
            script.setAttribute('data-size', 'large');
            script.setAttribute('data-radius', '8');
            script.setAttribute('data-userpic', 'true');
            script.setAttribute('data-onauth', 'onTelegramAuth(user)');
            
            document.getElementById('telegram-login').appendChild(script);
        };
    </script>
</body>
</html>
